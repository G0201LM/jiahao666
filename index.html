<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【格局鉴定】嘉豪MBTI人格全性向测试 (深度解析版)</title>
    <style>
        :root {
            --primary-color: #ffaa00; 
            --bg-color: #121212; 
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --danger-color: #ff4757;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; color: var(--text-color); transition: all 0.3s; margin: 0; }
        #app { background: var(--card-bg); width: 100%; max-width: 680px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #333; position: relative; overflow: hidden; }
        
        #app::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,170,0,0.05) 0%, transparent 70%); z-index: 0; pointer-events: none; }
        .content-wrapper { position: relative; z-index: 1; }

        .intro-screen { text-align: center; animation: fadeIn 1s; }
        .jh-logo { font-size: 72px; margin-bottom: 10px; display: block; text-shadow: 0 0 20px rgba(255,170,0,0.5); }
        h1 { color: var(--primary-color); margin-bottom: 10px; font-weight: 900; font-size: 32px; letter-spacing: 2px; }
        .subtitle { color: #888; font-size: 15px; margin-bottom: 30px; line-height: 1.6; }
        .warning-box { background: rgba(255, 71, 87, 0.1); border: 1px solid var(--danger-color); padding: 15px; border-radius: 10px; margin-bottom: 30px; color: var(--danger-color); font-size: 14px; font-weight: bold; }
        
        .progress { height: 6px; background: #333; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        #progress-bar { height: 100%; background: linear-gradient(90deg, #ffaa00, #ff4757); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-color); }
        .question { display: none; animation: slideIn 0.4s; }
        .question.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 25px; line-height: 1.6; color: #fff; border-left: 5px solid var(--primary-color); padding-left: 15px; }
        .options { display: flex; flex-direction: column; gap: 15px; }
        button.option-btn { 
            width: 100%; padding: 18px 25px; text-align: left;
            border: 2px solid #333; border-radius: 12px; background: #252525; 
            cursor: pointer; font-size: 16px; transition: all 0.2s; color: var(--text-color);
        }
        button.option-btn:hover { background: #333; border-color: var(--primary-color); transform: translateY(-2px); color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* 结果界面专属优化 */
        #result { display: none; text-align: center; animation: fadeIn 0.8s; }
        .mbti-card { background: linear-gradient(145deg, #2a2a2a, #1a1a1a); border: 2px solid var(--primary-color); border-radius: 15px; padding: 30px 20px; margin-bottom: 30px; position: relative; box-shadow: 0 0 30px rgba(255,170,0,0.2); }
        .mbti-type { font-size: 48px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--primary-color), 2px 2px 0px var(--danger-color); margin-bottom: 5px; letter-spacing: 4px; }
        .mbti-name { font-size: 24px; color: var(--primary-color); font-weight: bold; margin-bottom: 20px; display: block; }
        .score-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: inline-block; margin-bottom: 20px; }
        .score-box span { color: var(--danger-color); font-weight: bold; font-size: 20px; }
        
        .mbti-desc { text-align: left; font-size: 16px; line-height: 1.8; color: #eee; border-top: 1px dashed #555; padding-top: 20px; margin-bottom: 20px; font-weight: bold; }
        
        /* 性格深度分析长文框 */
        .mbti-analysis { text-align: left; font-size: 15px; line-height: 1.9; color: #bbb; background: #181818; padding: 20px; border-radius: 10px; border-left: 4px solid var(--primary-color); height: 250px; overflow-y: auto; text-indent: 2em; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        /* 滚动条美化 */
        .mbti-analysis::-webkit-scrollbar { width: 8px; }
        .mbti-analysis::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        .mbti-analysis::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }
        
        .start-btn, .restart-btn { 
            background: linear-gradient(45deg, #ffaa00, #ff4757); color: #fff; border: none; padding: 16px 40px; 
            font-weight: bold; font-size: 18px; border-radius: 30px; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 8px 20px rgba(255,71,87,0.4); width: 100%; max-width: 300px; margin-top: 10px;
        }
        .start-btn:hover, .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255,71,87,0.6); }

        @media (max-width: 600px) {
            #app { padding: 25px 20px; }
            h1 { font-size: 24px; }
            .q-text { font-size: 18px; }
            button.option-btn { padding: 15px; font-size: 15px; }
            .mbti-type { font-size: 36px; }
            .mbti-name { font-size: 20px; }
            .mbti-analysis { height: 200px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="app">

</div>

function startQuiz() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const qBox = document.getElementById('question-box');
    const progress = document.getElementById('progress-bar');
    const q = questions[currentIdx];
    
    progress.style.width = ((currentIdx / questions.length) * 100) + "%";
    
    let html = `<div class="question active">
        <div class="q-text">第 ${currentIdx + 1} / 25 题：<br>${q.q}</div>
        <div class="options">`;
    q.a.forEach((opt, index) => {
        html += `<button class="option-btn" onclick="next(${q.s[index]})">${opt}</button>`;
    });
    html += `</div></div>`;
    qBox.innerHTML = html;
}

function next(score) {
    totalScore += score;
    currentIdx++;
    
    if (currentIdx < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-container').style.display = 'none';
    const resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    
    const finalPercent = Math.min(Math.round((totalScore / maxPossibleScore) * 100), 100);
    
    let profile = mbtiProfiles[0];
    for (let i = 0; i < mbtiProfiles.length; i++) {
        if (finalPercent <= mbtiProfiles[i].threshold) {
            profile = mbtiProfiles[i];
            break;
        }
    }
    
    let currentScore = 0;
    const scoreElement = document.getElementById('final-score');
    const timer = setInterval(() => {
        scoreElement.innerText = currentScore + "%";
        if(currentScore >= finalPercent) {
            clearInterval(timer);
            scoreElement.innerText = finalPercent + "%";
        } else {
            currentScore += Math.ceil((finalPercent - currentScore) / 10) || 1;
        }
    }, 30);

    setTimeout(() => {
        document.getElementById('mbti-letters').innerText = profile.type;
        document.getElementById('mbti-title').innerText = profile.name;
        document.getElementById('mbti-desc').innerText = profile.shortDesc;
        document.getElementById('mbti-analysis').innerText = profile.detailedAnalysis;
    }, 400);
}
</script>
