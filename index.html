<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【格局鉴定】嘉豪人格浓度全性向测试 (JH-25 Pro)</title>
    <style>
        :root {
            --primary-color: #f39c12; /* 嘉豪金 */
            --bg-color: #1a1a1a; /* 深邃黑，更有故事感 */
            --text-color: #e0e0e0;
            --card-bg: #2c2c2c;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 20px; color: var(--text-color); transition: all 0.3s; }
        #app { background: var(--card-bg); width: 100%; max-width: 650px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid #444; }
        
        /* 开始界面样式优化 */
        .intro-screen { text-align: center; animation: fadeIn 1s; }
        .jh-logo { font-size: 64px; margin-bottom: 10px; display: block; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .subtitle { text-align: center; color: #aaa; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }
        .warning-box { background: rgba(243, 156, 18, 0.1); border: 1px solid var(--primary-color); padding: 15px; border-radius: 10px; margin-bottom: 30px; color: var(--primary-color); font-size: 14px; }
        
        /* 答题界面样式 */
        .progress { height: 6px; background: #444; border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--primary-color); }
        .question { display: none; animation: fadeIn 0.5s; }
        .question.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .q-text { font-size: 20px; font-weight: bold; margin-bottom: 25px; line-height: 1.5; color: #fff; border-left: 5px solid var(--primary-color); padding-left: 15px; }
        .options { display: flex; flex-direction: column; gap: 15px; }
        button.option-btn { 
            width: 100%; padding: 18px 25px; text-align: left;
            border: 2px solid #444; border-radius: 12px; background: #333; 
            cursor: pointer; font-size: 16px; transition: all 0.2s; color: var(--text-color);
        }
        button.option-btn:hover { background: #444; border-color: var(--primary-color); transform: scale(1.02); color: #fff; }
        
        /* 结果界面样式优化 */
        #result { display: none; text-align: center; animation: fadeIn 0.6s; }
        .result-header { font-size: 24px; color: #fff; margin-bottom: 10px; }
        .score-label { font-size: 16px; color: #aaa; }
        .score { font-size: 72px; font-weight: 900; color: var(--primary-color); margin: 10px 0 20px 0; text-shadow: 0 0 15px rgba(243,156,18,0.5); }
        .desc-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid #444; text-align: left; margin-bottom: 30px; }
        .desc-title { font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 15px; text-align: center; display: block;}
        .desc-content { font-size: 16px; line-height: 1.9; color: #ccc; }
        .desc-content b { color: #fff; }
        
        /* 按钮样式 */
        .start-btn, .restart-btn { 
            background: var(--primary-color); color: #fff; border: none; padding: 15px 40px; 
            font-weight: bold; font-size: 18px; border-radius: 30px; cursor: pointer; 
            transition: all 0.2s; box-shadow: 0 5px 15px rgba(243,156,18,0.3);
        }
        .start-btn:hover, .restart-btn:hover { background: #e67e22; transform: translateY(-2px); box-shadow: 0 7px 20px rgba(243,156,18,0.4); }

        /* 响应式 */
        @media (max-width: 600px) {
            #app { padding: 20px; }
            h1 { font-size: 24px; }
            .q-text { font-size: 18px; }
            button.option-btn { padding: 15px; font-size: 15px; }
        }
    </style>
</head>

</div>

<script>

    { q: "在聚会上，你发现有个人偷偷看了你两眼，你的第一反应是？", a: ["一定是看上我了，或者被我的气质吸引了", "可能是我衣服穿反了，或者脸上沾了东西", "只是碰巧视线交汇吧，无所谓", "我也看回去，并送上一个意味深长的微笑"], s: [4, 0, 1, 3] },

    { q: "如果有人对你说‘你这人挺有意思的’，你会觉得？", a: ["那当然，我可是万里挑一的有趣灵魂", "他是在客套吧", "他是不是觉得我刚才说错话了？", "回一句：‘你才发现？’"], s: [4, 1, 0, 3] },

    { q: "你最喜欢的拍照姿势是？", a: ["眼神不看镜头，看向远方，营造出一种忧郁/清冷感", "对着镜子自拍，用手机挡住半张脸", "双手抱胸，或者一只手摸着下巴，展现深沉", "大大方方地笑，比个剪刀手"], s: [4, 2, 3, 0] },
    { q: "对于‘小众/高级感’这个词，你的理解是？", a: ["必须是我用过而别人没听过的品牌，用来拉开阶级差距", "用来在朋友圈文案里拔高自己品味的词汇", "就是不随波逐流的个人喜好", "纯粹是商家用来割韭菜的噱头"], s: [4, 3, 1, 0] },
    { q: "你如何看待读书这件事？", a: ["社会才是一所真正的大学，书本上的东西太死板了", "买几本畅销经管书或文艺小说摆在桌上，主要是为了拍照好看", "有空就看，充实自己", "不看书，只看八卦和短视频"], s: [3, 4, 0, 1] },
    { q: "KTV里，别人都在嗨，你会怎么做？", a: ["一个人坐在角落，眼神迷离，仿佛看透了这红尘", "抢过麦克风，深情演唱一首极具年代感的苦情歌", "和大家一起摇骰子、喝饮料", "默默吃果盘，当个透明人"], s: [4, 3, 1, 0] },
    { q: "当你和别人辩论，对方逻辑严密让你无法反驳时，你会用哪句话收尾？", a: ["‘你的格局还是小了，跟你说不明白’", "‘懂的都懂，不懂的我也不多解释，细品吧’", "‘你说的确实有道理，我受教了’", "‘随便你怎么想吧，你开心就好’"], s: [3, 4, 0, 1] },
    { q: "朋友遇到困难找你倾诉，你通常怎么回复？", a: ["‘这种人你还留着过年？要是我早让他滚了，你就是太软弱。’", "认真帮他分析问题，提出客观建议", "只当个倾听者，陪着骂两句", "‘哎，爱情这东西本来就是劫，看开点吧。’"], s: [4, 0, 1, 3] },
    { q: "如果你发现自己做错了一件事，你的第一反应是？", a: ["不可能，肯定是某个环节或者别人的问题导致了我的失误", "表面上不承认，私底下偷偷弥补", "大大方方承认错误并道歉", "找个‘虽然我错了，但情有可原’的完美借口"], s: [4, 2, 0, 3] },
    { q: "如果突然中了 500 万，第一件事去干嘛？", a: ["全款提一辆豪车/买一墙爱马仕，回老家/老同学面前晃悠一圈", "在朋友圈发一条隐晦的文案，比如‘终于等到这一天’", "先把欠的钱还了，然后存起来理财", "辞职，然后把老板骂一顿"], s: [4, 3, 0, 2] },

    { q: "你认为自己在异性眼中的形象是？", a: ["危险又迷人，让人想靠近又不敢靠近", "一个可以倾吐心声的知心大哥哥/大姐姐", "就是个普通的好人", "搞笑女/搞笑男"], s: [4, 3, 0, 1] },

    { q: "你的微信偶像是谁（或者朋友圈最想展现出谁的气质）？", a: ["叱咤风云的商界大佬/永远优雅的老钱风名媛", "看破红尘的忧郁浪子/不食人间烟火的清冷美人", "热爱生活的运动达人/旅行家", "没什么特别的，做真实的自己"], s: [4, 3, 1, 0] },
    { q: "如果别人用‘做作’来形容你，你会？", a: ["那是他们不懂我的精致与仪式感", "生气，在心里把对方拉黑一万次", "反思自己是不是哪件事有点过了", "笑笑不说话，觉得对方很酸"], s: [4, 3, 0, 2] },
    { q: "最后一题：你觉得自己身上有‘嘉豪人格’（迷之自信/强行装杯）吗？", a: ["这什么破测试，老子/老娘根本不知道你在说什么，我是我自己的王", "可能有一点吧，但那叫真性情", "应该没有，我只是个普通人", "太有了，感觉每一道题都在念我的身份证号"], s: [4, 2, 0, 0] }
];

let currentIdx = 0;
let totalScore = 0;
const maxPossibleScore = 100;

function startQuiz() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    showQuestion();
}

function showQuestion() {
    const qBox = document.getElementById('question-box');
    const progress = document.getElementById('progress-bar');
    const q = questions[currentIdx];
    
    progress.style.width = ((currentIdx / questions.length) * 100) + "%";
    
    let html = `<div class="question active">
        <div class="q-text">第 ${currentIdx + 1} 题：${q.q}</div>
        <div class="options">`;
    q.a.forEach((opt, index) => {
        html += `<button class="option-btn" onclick="next(${q.s[index]})">${opt}</button>`;
    });
    html += `</div></div>`;
    qBox.innerHTML = html;
}

function next(score) {
    totalScore += score;
    currentIdx++;
    
    if (currentIdx < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-container').style.display = 'none';
    const resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    
    const finalPercent = Math.min(Math.round((totalScore / maxPossibleScore) * 100), 100);
    
    let currentScore = 0;
    const scoreElement = document.getElementById('final-score');
    const timer = setInterval(() => {
        scoreElement.innerText = currentScore + "%";
        if(currentScore >= finalPercent) {
            clearInterval(timer);
            scoreElement.innerText = finalPercent + "%";
        } else {
            currentScore += Math.ceil((finalPercent - currentScore) / 10) || 1;
        }
    }, 30);

    let tier = "";
    let desc = "";
    
    // --- 结果评价注入大量嘉豪色彩词汇 ---
    if(finalPercent < 20) {
        tier = "【凡人段位 / 格局归零】";
        desc = "<b>拿捏失败。</b>你体内几乎没有嘉豪基因。你是一个踏实、真诚且清醒的普通人。在嘉豪眼中，你是一个‘不懂得包装自己、格局太小’的凡夫俗子。你太真，真到不需要任何做作的修饰，这在“嘉豪学”里叫<b>‘没故事’</b>。";
    } else if(finalPercent < 50) {
        tier = "【隐性嘉豪 / 薛定谔的格局】";
        desc = "<b>有点意思，但不多。</b>你平时看起来很正常，但在某些特定的时刻（例如深夜、或者遇到心仪的异性），你体内的<b>‘深情抗体’</b>就会失效。偶尔会冒出一两句做作的语录，或者摆出一些强凹的造型。注意控油，你的格局还在<b>‘懂的都懂’</b>的萌芽阶段。";
    } else if(finalPercent < 80) {
        tier = "【半步王者 / 眼神拿捏大师】";
        desc = "<b>成了！兄弟/姐妹，你的格局已经打开了！</b>你举手投足间那股三分讥笑七分薄凉的气质，已经拿捏得十分到位。你的一条朋友圈，起码需要凡人细品半小时。你不是在装杯，你觉得这就是你理解的<b>‘仪式感’</b>。继续保持，王座在向你招手。";
    } else {
        tier = "【嘉豪本豪 / 大乘格局大帝】";
        desc = "<b>卧槽！这浓度爆表了！</b>系统检测到你的嘉豪基因已经突破天际！你是行走的荷尔蒙/人间富贵花，你是凡人眼中的光。你那眼神里的忧郁与自信，足以整顿整个互联网的审美。别测了，赶紧去开直播，去拍段子，去展现你那<b>‘无法安放的真性情’</b>。互联网需要你这样的王者来拿捏！";
    }
    
    setTimeout(() => {
        document.getElementById('final-tier').innerText = tier;
        document.getElementById('final-desc').innerHTML = desc;
    }, 500);
}
</script>

</body>
</html>
